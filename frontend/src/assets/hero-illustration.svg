<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#heroGradient)"/>
  
  <!-- Warehouse shelves -->
  <rect x="50" y="100" width="80" height="120" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <rect x="50" y="140" width="80" height="20" fill="#e5e7eb"/>
  <rect x="50" y="180" width="80" height="20" fill="#e5e7eb"/>
  
  <!-- Boxes on shelves -->
  <rect x="55" y="105" width="15" height="15" fill="#4f46e5" opacity="0.8"/>
  <rect x="75" y="105" width="15" height="15" fill="#7c3aed" opacity="0.8"/>
  <rect x="95" y="105" width="15" height="15" fill="#4f46e5" opacity="0.8"/>
  
  <rect x="55" y="145" width="15" height="15" fill="#10b981" opacity="0.8"/>
  <rect x="75" y="145" width="15" height="15" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Shipping area -->
  <rect x="200" y="150" width="120" height="80" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="260" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">SHIPPING</text>
  
  <!-- Boxes being shipped -->
  <rect x="210" y="185" width="20" height="20" fill="#4f46e5"/>
  <rect x="235" y="185" width="20" height="20" fill="#7c3aed"/>
  <rect x="260" y="185" width="20" height="20" fill="#10b981"/>
  <rect x="285" y="185" width="20" height="20" fill="#f59e0b"/>
  
  <!-- Flow arrows -->
  <path d="M130 160 L170 160" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M320 195 L360 195" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Truck -->
  <rect x="360" y="185" width="30" height="15" fill="#374151" rx="2"/>
  <circle cx="370" cy="205" r="4" fill="#6b7280"/>
  <circle cx="385" cy="205" r="4" fill="#6b7280"/>
  
  <!-- Dashboard screen -->
  <rect x="250" y="50" width="120" height="80" fill="#1f2937" rx="4"/>
  <rect x="255" y="55" width="110" height="15" fill="#374151" rx="2"/>
  <rect x="255" y="75" width="50" height="8" fill="#10b981" rx="1"/>
  <rect x="255" y="87" width="35" height="8" fill="#4f46e5" rx="1"/>
  <rect x="295" y="87" width="25" height="8" fill="#f59e0b" rx="1"/>
  
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="50%" style="stop-color:#faf9ff"/>
      <stop offset="100%" style="stop-color:#f0f7f4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0 0 L0 6 L9 3 z" fill="#4f46e5"/>
    </marker>
  </defs>
</svg>